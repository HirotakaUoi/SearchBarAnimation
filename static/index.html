<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配列探索アルゴリズム</title>
  <link rel="stylesheet" href="/static/css/style.css?v=1">
</head>
<body>

  <!-- ===== ヘッダー ===== -->
  <header>
    <!-- 1行目: タイトル + パネル操作 -->
    <div class="header-row">
      <h1>🔍 配列探索アルゴリズム</h1>
      <div id="toolbar">
        <button id="btn-add-panel"  class="btn btn-add">＋ パネル追加</button>
        <button id="btn-start-all"  class="btn btn-success">▶▶ 全開始</button>
        <button id="btn-pause-all"  class="btn btn-warning">⏸ 全一時停止</button>
        <button id="btn-stop-all"   class="btn btn-danger">⏹ 全停止</button>
        <button id="btn-reset-all"  class="btn btn-secondary">↺ 全リセット</button>
        <button id="btn-sync-size"  class="btn btn-secondary" title="最前面のパネルサイズに全パネルを合わせる">⊞ サイズ統一</button>
        <div id="zoom-controls">
          <button id="btn-zoom-out"   class="btn btn-secondary" title="縮小">－</button>
          <span   id="zoom-label">100%</span>
          <button id="btn-zoom-in"    class="btn btn-secondary" title="拡大">＋</button>
          <button id="btn-zoom-reset" class="btn btn-secondary" title="ズームリセット">↺</button>
        </div>
      </div>
    </div>
    <!-- 2行目: 全パネル一括設定 -->
    <div class="header-row" id="global-controls">
      <span class="global-label">全パネル一括:</span>
      <label>データ数
        <select id="global-size"></select>
      </label>
      <label>target
        <input type="number" id="global-target" min="0" max="999" placeholder="自動"
               style="width:60px" title="探索する値 (空欄=自動)">
      </label>
      <div class="speed-group">
        <label>速度</label>
        <input type="range" id="global-speed" min="1" max="200" value="80" title="大きいほど速い">
        <span id="global-speed-val">×1.0</span>
      </div>
      <button id="btn-apply-global" class="btn btn-secondary">↕ 全パネルへ適用</button>
    </div>
  </header>

  <!-- ===== パネルグリッド ===== -->
  <main id="panels-container"></main>

  <!-- ===== スクリプト ===== -->
  <script src="/static/js/array_canvas.js?v=7"></script>
  <script src="/static/js/ws_client.js?v=1"></script>
  <script src="/static/js/app.js?v=8"></script>
</body>
</html>
